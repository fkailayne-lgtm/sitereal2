<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KFX Roupas e Acessórios | Anime Style</title>
    <style>
        body {
            background-color: #000; /* Fundo Preto */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* Cabeçalho */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 2px solid #ff4500; /* Laranja/Vermelho */
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff4500;
            text-transform: uppercase;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
        }

        nav a:hover { color: #ff0000; }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
        }

        .btn-login {
            background-color: #ff4500;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Vitrine de Produtos */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px 5%;
        }

        .product-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #333;
        }

        .product-card img { width: 100%; border-radius: 5px; }
        .product-card h3 { margin: 15px 0; }
        .price { color: #ff4500; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">KFXEDITS</div>
    <nav>
        <a href="#">Coleções</a>
        <a href="#">Acessórios</a>
        <button class="btn-login">ENTRAR / LOGIN</button>
    </nav>
</header>

<section class="hero">
    <h1>KFX ROUPAS E ACESSÓRIOS</h1>
    <p>A estética Anime que você procura. Qualidade kfxedits.</p>
</section>

<div class="products">
    <div class="product-card">
        <div style="height:200px; background:#ff4500; border-radius:5px; display:flex; align-items:center; justify-content:center;">
            <span>[DESENHO ANIME]</span>
        </div>
        <h3>Camiseta Oversized Orange</h3>
        <p class="price">R$ 89,90</p>
    </div>

    <div class="product-card">
        <div style="height:200px; background:#fff; color:#000; border-radius:5px; display:flex; align-items:center; justify-content:center;">
            <span>[DESENHO ANIME]</span>
        </div>
        <h3>Moletom KFX White Cloud</h3>
        <p class="price">R$ 159,90</p>
    </div>

    <div class="product-card">
        <div style="height:200px; background:#cc0000; border-radius:5px; display:flex; align-items:center; justify-content:center;">
            <span>[DESENHO ANIME]</span>
        </div>
        <h3>T-Shirt Crimson Ninja</h3>
        <p class="price">R$ 89,90</p>
    </div>
</div>

</body>
</html>
